# This workflow uses actions that are not certified by GitHub.
# Frogbot Scan and Fix for Terraform projects

name: "Frogbot Scan and Fix"

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  security-events: write

jobs:
  create-fix-pull-requests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ✅ Setup Terraform (added)
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # ✅ Initialize Terraform (added)
      - name: Terraform Init for environments
        shell: bash
        run: |
          set -e
          echo "Initializing Terraform projects..."
          for d in terraform/environments/*; do
            if [ -d "$d" ] && ls "$d"/*.tf >/dev/null 2>&1; then
              echo "==> terraform init in: $d"
              terraform -chdir="$d" init -input=false -backend=false
            else
              echo "Skipping: $d (no Terraform files)"
            fi
          done

      # ✅ Frogbot step (your original)
      - uses: jfrog/frogbot@5d9c42c30f1169d8be4ba5510b40e75ffcbbc2a9  # v2.21.2
        env:
          # JFrog platform URL
          JF_URL: ${{ secrets.JF_URL }}

          # JFrog access token
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}

          # GitHub token
          JF_GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # Optional (keep if needed)
          # JF_RELEASES_REPO: ""
          # JF_DEPS_REPO: ""
